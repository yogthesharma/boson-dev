services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boson}
      POSTGRES_DB: ${POSTGRES_DB:-boson}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - boson_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boson} -d ${POSTGRES_DB:-boson}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-boson}:${POSTGRES_PASSWORD:-boson}@postgres:5432/${POSTGRES_DB:-boson}
      REDIS_URL: redis://redis:6379
      BOSON_AUTH_DISABLED: ${BOSON_AUTH_DISABLED:-}
      BOSON_JWT_SECRET: ${BOSON_JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Browser calls same origin; nginx proxies /api → server
        VITE_API_PREFIX: /api
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - server

volumes:
  boson_pgdata:
