workspace: boson-demo

environments:
  # Listed first so a plain `boson push` works without a local server on :8080.
  - name: jsonplaceholder
    baseUrl: https://jsonplaceholder.typicode.com
    vars: {}
  - name: local
    baseUrl: http://localhost:8080
    vars:
      apiKey: dev-key

requests:
  - id: users.list
    name: List Users
    method: GET
    url: "{{baseUrl}}/users"
    headers:
      Accept: application/json
    body:
      type: none

  - id: users.get-by-id
    name: Get User by ID
    method: GET
    url: "{{baseUrl}}/users/1"
    headers:
      Accept: application/json
    body:
      type: none

  - id: users.create
    name: Create User
    method: POST
    url: "{{baseUrl}}/users"
    headers:
      Accept: application/json
      Content-Type: application/json
    body:
      type: json
      content: |
        {
          "name": "Boson",
          "email": "demo@example.com"
        }

  - id: posts.search
    name: Search Posts
    method: GET
    url: "{{baseUrl}}/posts"
    headers:
      Accept: application/json
    body:
      type: none
