name: release

# Publishes Boson binaries to a GitHub Release whenever a `v*` tag is pushed.
# Asset names follow `boson-<rustc-target>.<tar.gz|zip>` so they line up with
# what `boson update` and `install.sh` look for.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip

    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web UI
        run: pnpm --dir web install --frozen-lockfile && pnpm --dir web build

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release (native)
        if: '!matrix.cross'
        env:
          BOSON_SKIP_WEB_BUILD: "1"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (cross)
        if: matrix.cross
        env:
          BOSON_SKIP_WEB_BUILD: "1"
          CROSS_CONTAINER_OPTS: "--env BOSON_SKIP_WEB_BUILD=1"
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="boson-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/boson" "dist/${name}/boson"
          cp README.md "dist/${name}/README.md" 2>/dev/null || true
          ( cd dist && tar -czf "${name}.tar.gz" "${name}" )
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "boson-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/boson.exe" "dist/$name/boson.exe"
          if (Test-Path "README.md") { Copy-Item "README.md" "dist/$name/README.md" }
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boson-${{ matrix.target }}
          path: |
            dist/boson-${{ matrix.target }}.${{ matrix.archive }}
            dist/boson-${{ matrix.target }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Inspect artifacts
        run: ls -la dist

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          draft: false
          prerelease: ${{ contains(env.TAG, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/boson-*.tar.gz
            dist/boson-*.tar.gz.sha256
            dist/boson-*.zip
            dist/boson-*.zip.sha256
