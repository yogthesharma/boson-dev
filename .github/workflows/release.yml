name: release

# Publishes Boson binaries to a GitHub Release whenever a `v*` tag is pushed.
# Asset names follow `boson-<rustc-target>.<tar.gz|zip>` so they line up with
# what `boson update` and `install.sh` look for.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: >
          Tag to publish (e.g. v0.1.6). Must already exist on origin — push it
          first: git tag -a v0.1.6 -m "Release v0.1.6" && git push origin v0.1.6.
          Pushing a v* tag also starts this workflow; manual dispatch is optional.
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight release inputs
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid release tag::TAG must look like v0.1.0 or v0.1.0-rc.1. Got: ${TAG}"
            exit 1
          fi

      - name: Validate tag exists on remote
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          remote="https://github.com/${GITHUB_REPOSITORY}.git"
          for attempt in 1 2 3 4 5; do
            if git ls-remote --exit-code --tags "${remote}" "refs/tags/${TAG}" >/dev/null; then
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error title=Missing release tag::Tag '${TAG}' was not found on origin. Push the tag first (git push origin ${TAG})."
              exit 1
            fi
            sleep_for=$((attempt * 3))
            echo "tag check retry ${attempt}/5 failed; waiting ${sleep_for}s..."
            sleep "${sleep_for}"
          done

  build:
    name: ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    continue-on-error: ${{ matrix.non_blocking || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            non_blocking: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip

    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web UI
        run: pnpm --dir web install --frozen-lockfile && pnpm --dir web build

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release (native)
        if: '!matrix.cross'
        env:
          BOSON_SKIP_WEB_BUILD: "1"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (cross)
        if: matrix.cross
        env:
          BOSON_SKIP_WEB_BUILD: "1"
          CROSS_CONTAINER_OPTS: "--env BOSON_SKIP_WEB_BUILD=1"
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="boson-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/boson" "dist/${name}/boson"
          cp README.md "dist/${name}/README.md" 2>/dev/null || true
          ( cd dist && tar -czf "${name}.tar.gz" "${name}" )
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "boson-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/boson.exe" "dist/$name/boson.exe"
          if (Test-Path "README.md") { Copy-Item "README.md" "dist/$name/README.md" }
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: boson-${{ matrix.target }}
          path: |
            dist/boson-${{ matrix.target }}.${{ matrix.archive }}
            dist/boson-${{ matrix.target }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Inspect artifacts
        run: ls -la dist

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          draft: false
          prerelease: ${{ contains(env.TAG, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/boson-*.tar.gz
            dist/boson-*.tar.gz.sha256
            dist/boson-*.zip
            dist/boson-*.zip.sha256

  verify:
    name: Verify release artifacts
    needs: publish
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Verify local artifact checklist
        shell: bash
        run: |
          set -euo pipefail

          # 1) Assets present
          test -f dist/boson-x86_64-unknown-linux-gnu.tar.gz
          test -f dist/boson-x86_64-unknown-linux-gnu.tar.gz.sha256
          test -f dist/boson-aarch64-unknown-linux-gnu.tar.gz
          test -f dist/boson-aarch64-unknown-linux-gnu.tar.gz.sha256
          test -f dist/boson-x86_64-pc-windows-msvc.zip
          test -f dist/boson-x86_64-pc-windows-msvc.zip.sha256
          echo "assets present: ok"

          # 2) Checksums valid (cross-platform line ending safe)
          for sum_file in dist/*.sha256; do
            expected="$(awk '{print $1}' "${sum_file}")"
            artifact="$(awk '{print $2}' "${sum_file}" | tr -d '\r')"
            test -n "${expected}"
            test -n "${artifact}"
            test -f "dist/${artifact}"
            actual="$(shasum -a 256 "dist/${artifact}" | awk '{print $1}')"
            if [ "${actual}" != "${expected}" ]; then
              echo "::error title=checksum mismatch::${artifact} expected ${expected} got ${actual}"
              exit 1
            fi
          done
          echo "checksums valid: ok"

          # 3) Archives are readable
          tar -tzf dist/boson-x86_64-unknown-linux-gnu.tar.gz >/dev/null
          tar -tzf dist/boson-aarch64-unknown-linux-gnu.tar.gz >/dev/null
          unzip -t dist/boson-x86_64-pc-windows-msvc.zip >/dev/null
          echo "archive integrity: ok"

      - name: Verify remote install smoke test (retry)
        shell: bash
        run: |
          set -euo pipefail
          tmp_install="$(mktemp -d)"
          trap 'rm -rf "${tmp_install}"' EXIT INT TERM
          for attempt in 1 2 3 4 5; do
            if BOSON_VERSION="${TAG}" BOSON_INSTALL_DIR="${tmp_install}" bash ./install.sh; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error title=install.sh smoke test failed::install.sh could not install ${TAG} after retries"
              exit 1
            fi
            sleep_for=$((attempt * 15))
            echo "install retry ${attempt}/5 failed; waiting ${sleep_for}s..."
            sleep "${sleep_for}"
          done
          "${tmp_install}/boson" --version | grep -F "${TAG#v}"
          echo "install script smoke test: ok"
